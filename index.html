<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catalogador Maestro | Medina Carrillo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/technicalindicators@3.1.0/dist/browser.js"></script>
    <style>
        :root {
            --bg-color: #0b0b1a; --card-bg: #12122b; --text-main: #ffffff;
            --text-dim: #8e8ea7; --green-win: #00c853; --red-loss: #ff3d00;
            --accent: #00ffcc; --border: #2d2d5a;
        }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Inter', sans-serif; display: flex; padding: 20px; margin: 0; min-height: 100vh; }
        .sidebar { width: 340px; background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border); height: fit-content; position: sticky; top: 20px; }
        h4 { margin: 0 0 15px 0; color: var(--accent); text-transform: uppercase; font-size: 14px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .group { margin-bottom: 12px; }
        label { font-size: 11px; color: var(--text-dim); display: block; margin-bottom: 5px; font-weight: 600; text-transform: uppercase; }
        select, input { background: #0b0b1a; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 6px; width: 100%; font-size: 13px; outline: none; box-sizing: border-box; }
        .main { flex: 1; margin-left: 30px; }
        .card { background-color: var(--card-bg); border-radius: 16px; padding: 25px; border: 1px solid var(--border); text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .efficiency-val { font-size: 65px; font-weight: 700; color: var(--accent); margin: 15px 0; text-shadow: 0 0 20px rgba(0,255,204,0.3); }
        .history-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-top: 20px; }
        .box { height: 45px; border-radius: 8px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); transition: 0.3s; }
        .win { background: var(--green-win) !important; border: none !important; box-shadow: 0 0 15px var(--green-win); }
        .loss { background: var(--red-loss) !important; border: none !important; box-shadow: 0 0 15px var(--red-loss); }
        .log-terminal { margin-top: 20px; background: #000; padding: 15px; border-radius: 8px; font-family: 'Courier New', monospace; font-size: 11px; color: #00ff00; height: 120px; overflow-y: auto; border: 1px solid var(--border); text-align: left; }
        button { width: 100%; padding: 14px; background: var(--accent); border: none; border-radius: 8px; cursor: pointer; font-weight: 800; color: #0b0b1a; margin-top: 10px; text-transform: uppercase; transition: 0.3s; }
        button:hover { filter: brightness(1.1); transform: translateY(-1px); }
    </style>
</head>
<body>

    <div class="sidebar">
        <h4>Panel de Estrategia</h4>
        
        <div class="group">
            <label>Activo Financiero</label>
            <select id="pair">
                <option value="BTCUSDT">BTC / USDT</option>
                <option value="ETHUSDT">ETH / USDT</option>
                <option value="SOLUSDT">SOL / USDT</option>
                <option value="EURUSDT">EUR / USD</option>
            </select>
        </div>

        <div class="group">
            <label>Temporalidad</label>
            <select id="tf">
                <option value="1m">1m</option>
                <option value="5m" selected>5m</option>
                <option value="15m">15m</option>
                <option value="1h">1h</option>
            </select>
        </div>

        <div class="group">
            <label>Indicador Maestro</label>
            <select id="indType" onchange="toggleParams()">
                <option value="RSI">RSI (Relative Strength Index)</option>
                <option value="STOC">Estocástico (Stochastic)</option>
            </select>
        </div>

        <div id="params-rsi" class="group">
            <label>Periodo / Niveles (SC - SV)</label>
            <div style="display:flex; gap:8px;">
                <input type="number" id="rsi-p" value="14" placeholder="P">
                <input type="number" id="rsi-u" value="70" placeholder="SC">
                <input type="number" id="rsi-l" value="30" placeholder="SV">
            </div>
        </div>

        <div id="params-stoc" class="group" style="display:none;">
            <label>K / Niveles (SC - SV)</label>
            <div style="display:flex; gap:8px;">
                <input type="number" id="stoc-k" value="14">
                <input type="number" id="stoc-u" value="80">
                <input type="number" id="stoc-l" value="20">
            </div>
        </div>

        <div class="group">
            <label>Expiración (Velas)</label>
            <input type="number" id="exp" value="1">
        </div>

        <button onclick="ejecutarAnalisis()">Iniciar Catalogación</button>
    </div>

    <div class="main">
        <div class="card">
            <h2 id="pairDisplay" style="margin:0; color:var(--accent)">SISTEMA MEDINA CARRILLO</h2>
            <div class="efficiency-val" id="eff">0%</div>
            <div class="history-grid" id="grid"></div>
        </div>
        <div class="log-terminal" id="logger">> Protocolo de red Google Cloud listo.</div>
    </div>

<script>
    // URL DE TU GOOGLE APPS SCRIPT
    const PROXY_URL = "https://script.google.com/macros/s/AKfycbwNXuD_Du4pdjNBHG6NF3Lpks_J0Jv4i9-uGe7R4jQ-6WitKi909t0WA9Sywwcu7exdrg/exec";

    function log(m) { 
        const l = document.getElementById('logger');
        l.innerHTML += `<br>> ${m}`; 
        l.scrollTop = l.scrollHeight; 
    }

    function toggleParams() {
        const type = document.getElementById('indType').value;
        document.getElementById('params-rsi').style.display = type === 'RSI' ? 'block' : 'none';
        document.getElementById('params-stoc').style.display = type === 'STOC' ? 'block' : 'none';
    }

    async function ejecutarAnalisis() {
        // Verificar si la librería cargó
        if (typeof technicalindicators === 'undefined') {
            log("❌ Error: Librería técnica no cargada. Reintentando...");
            location.reload();
            return;
        }

        const pair = document.getElementById('pair').value;
        const tf = document.getElementById('tf').value;
        log(`📡 Solicitando datos a Google Cloud para ${pair}...`);

        try {
            const response = await fetch(`${PROXY_URL}?pair=${pair}&tf=${tf}`);
            const data = await response.json();

            if (data && Array.isArray(data)) {
                log(`✅ Datos recibidos. Analizando estrategia...`);
                procesar(data);
            } else {
                throw new Error("Datos de Google inválidos");
            }
        } catch (e) {
            log(`🛑 Error de conexión: ${e.message}`);
        }
    }

    function procesar(data) {
        try {
            const closes = data.map(d => parseFloat(d[4])).filter(n => !isNaN(n));
            const highs = data.map(d => parseFloat(d[2])).filter(n => !isNaN(n));
            const lows = data.map(d => parseFloat(d[3])).filter(n => !isNaN(n));
            
            const type = document.getElementById('indType').value;
            const exp = parseInt(document.getElementById('exp').value);
            
            let indicVal, sc, sv;

            if(type === 'RSI') {
                indicVal = technicalindicators.RSI.calculate({
                    values: closes, 
                    period: parseInt(document.getElementById('rsi-p').value)
                });
                sc = parseInt(document.getElementById('rsi-u').value);
                sv = parseInt(document.getElementById('rsi-l').value);
            } else {
                const stoch = technicalindicators.Stochastic.calculate({
                    high: highs, low: lows, close: closes,
                    period: parseInt(document.getElementById('stoc-k').value),
                    signalPeriod: 3
                });
                indicVal = stoch.map(s => s.k);
                sc = parseInt(document.getElementById('stoc-u').value);
                sv = parseInt(document.getElementById('stoc-l').value);
            }

            let resultados = [];
            const offset = closes.length - indicVal.length;

            for (let i = closes.length - exp - 1; i >= offset; i--) {
                const valActual = indicVal[i - offset];
                if (valActual >= sc || valActual <= sv) {
                    const esCompra = valActual <= sv;
                    const gano = esCompra ? (closes[i+exp] > closes[i]) : (closes[i+exp] < closes[i]);
                    resultados.push(gano ? 'win' : 'loss');
                    if (resultados.length >= 20) break;
                }
            }

            // UI Update
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            resultados.reverse().forEach(r => {
                const d = document.createElement('div');
                d.className = `box ${r}`;
                grid.appendChild(d);
            });

            while(grid.children.length < 20) {
                grid.innerHTML += '<div class="box"></div>';
            }

            const wins = resultados.filter(r => r === 'win').length;
            const eff = resultados.length > 0 ? Math.round((wins/resultados.length)*100) : 0;
            
            document.getElementById('eff').innerText = eff + "%";
            document.getElementById('pairDisplay').innerText = pair;
            log(`🎯 Catalogación exitosa para ${pair}.`);

        } catch (err) {
            log(`❌ Error en cálculo: ${err.message}`);
        }
    }

    // Inicializar rejilla
    window.onload = () => {
        const grid = document.getElementById('grid');
        for(let i=0; i<20; i++) grid.innerHTML += '<div class="box"></div>';
    };
</script>
</body>
</html>
