<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catalogador Maestro | Medina Carrillo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/technicalindicators@3.1.0/dist/browser.js"></script>
    <style>
        :root { --bg: #0b0b1a; --card: #12122b; --accent: #00ffcc; --text: #ffffff; --border: #2d2d5a; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; padding: 20px; margin: 0; min-height: 100vh; }
        .sidebar { width: 320px; background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); height: fit-content; }
        .main { flex: 1; margin-left: 30px; }
        .card { background: var(--card); border-radius: 16px; padding: 25px; border: 1px solid var(--border); text-align: center; }
        .efficiency { font-size: 70px; font-weight: 800; color: var(--accent); text-shadow: 0 0 20px rgba(0,255,204,0.3); }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 20px; }
        .box { height: 45px; border-radius: 6px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); }
        .win { background: #00c853 !important; border: none !important; box-shadow: 0 0 15px #00c853; }
        .loss { background: #ff3d00 !important; border: none !important; box-shadow: 0 0 15px #ff3d00; }
        .log { margin-top: 20px; background: #000; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 11px; color: #00ff00; height: 100px; overflow-y: auto; text-align: left; }
        select, input, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid var(--border); background: #0b0b1a; color: white; outline: none; }
        button { background: var(--accent); color: #0b0b1a; font-weight: 800; cursor: pointer; border: none; }
    </style>
</head>
<body>

<div class="sidebar">
    <h3 style="color:var(--accent); margin-top:0">CONFIGURACIÓN</h3>
    <label>Activo</label>
    <select id="pair"><option value="BTCUSDT">BTC/USDT</option><option value="ETHUSDT">ETH/USDT</option></select>
    <label>Temporalidad</label>
    <select id="tf"><option value="1m">1m</option><option value="5m" selected>5m</option></select>
    <label>Expiración</label>
    <input type="number" id="exp" value="1">
    <button onclick="ejecutar()">ANALIZAR AHORA</button>
</div>

<div class="main">
    <div class="card">
        <h2 id="pairName">SISTEMA LISTO</h2>
        <div class="efficiency" id="eff">0%</div>
        <div class="grid" id="grid"></div>
    </div>
    <div class="log" id="log">> Esperando orden de ejecución...</div>
</div>

<script>
    const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbwNXuD_Du4pdjNBHG6NF3Lpks_J0Jv4i9-uGe7R4jQ-6WitKi909t0WA9Sywwcu7exdrg/exec"; // <--- PEGA TU LINK AQUÍ

    async function ejecutar() {
        const p = document.getElementById('pair').value;
        const t = document.getElementById('tf').value;
        const logger = document.getElementById('log');
        logger.innerText = `> Google Cloud analizando ${p}...`;

        try {
            const res = await fetch(`${GOOGLE_URL}?pair=${p}&tf=${t}`);
            const data = await res.json();
            
            const closes = data.map(d => parseFloat(d[4]));
            const rsi = technicalindicators.RSI.calculate({values: closes, period: 14});
            
            let resList = [];
            for (let i = closes.length - 2; i >= closes.length - 100; i--) {
                let v = rsi[i - (closes.length - rsi.length)];
                if (v >= 70 || v <= 30) {
                    let win = v <= 30 ? closes[i+1] > closes[i] : closes[i+1] < closes[i];
                    resList.push(win ? 'win' : 'loss');
                    if (resList.length >= 20) break;
                }
            }

            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            resList.reverse().forEach(r => {
                const d = document.createElement('div'); d.className = `box ${r}`;
                grid.appendChild(d);
            });

            const wins = resList.filter(r => r === 'win').length;
            document.getElementById('eff').innerText = Math.round((wins/resList.length)*100) + "%";
            document.getElementById('pairName').innerText = p;
            logger.innerText = "> Análisis exitoso vía Google Cloud.";
        } catch (e) {
            logger.innerText = "> Error: Asegúrate de que la URL de Google Script sea correcta.";
        }
    }
    for(let i=0; i<20; i++) document.getElementById('grid').innerHTML += '<div class="box"></div>';
</script>
</body>
</html>
