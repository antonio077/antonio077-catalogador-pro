<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catalogador Maestro | Medina Carrillo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/technicalindicators@3.1.0/dist/browser.js"></script>
    <style>
        :root {
            --bg-color: #0b0b1a; --card-bg: #12122b; --text-main: #ffffff;
            --text-dim: #8e8ea7; --green-win: #00c853; --red-loss: #ff3d00;
            --accent: #00ffcc; --border: #2d2d5a;
        }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Inter', sans-serif; display: flex; padding: 20px; margin: 0; min-height: 100vh; }
        .sidebar { width: 340px; background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border); height: fit-content; position: sticky; top: 20px; }
        h4 { margin: 0 0 15px 0; color: var(--accent); text-transform: uppercase; font-size: 14px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .group { margin-bottom: 12px; }
        label { font-size: 11px; color: var(--text-dim); display: block; margin-bottom: 5px; font-weight: 600; }
        select, input { background: #0b0b1a; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 6px; width: 100%; font-size: 13px; outline: none; }
        .main { flex: 1; margin-left: 30px; }
        .card { background-color: var(--card-bg); border-radius: 16px; padding: 25px; border: 1px solid var(--border); text-align: center; }
        .efficiency-val { font-size: 60px; font-weight: 700; color: var(--accent); text-shadow: 0 0 20px rgba(0,255,204,0.3); }
        .history-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-top: 20px; }
        .box { height: 45px; border-radius: 8px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); transition: 0.4s; }
        .box.win { background: var(--green-win); border: none; box-shadow: 0 0 15px var(--green-win); }
        .box.loss { background: var(--red-loss); border: none; box-shadow: 0 0 15px var(--red-loss); }
        .log-terminal { margin-top: 20px; background: #000; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 11px; color: #00ff00; height: 120px; overflow-y: auto; border: 1px solid var(--border); }
        button { width: 100%; padding: 14px; background: var(--accent); border: none; border-radius: 8px; cursor: pointer; font-weight: 800; color: #0b0b1a; margin-top: 10px; text-transform: uppercase; }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="sidebar">
        <h4>Panel de Análisis</h4>
        <div class="group">
            <label>Par (Binance)</label>
            <select id="pair">
                <option value="BTCUSDT">BTC / USDT</option>
                <option value="ETHUSDT">ETH / USDT</option>
                <option value="SOLUSDT">SOL / USDT</option>
                <option value="EURUSDT">EUR / USD</option>
            </select>
        </div>
        <div class="group">
            <label>Temporalidad</label>
            <select id="tf">
                <option value="1m">1m</option>
                <option value="5m" selected>5m</option>
                <option value="15m">15m</option>
                <option value="1h">1h</option>
            </select>
        </div>
        <div class="group">
            <label>Estrategia</label>
            <select id="indType" onchange="toggleInd()">
                <option value="RSI">RSI</option>
                <option value="STOC">Estocástico</option>
            </select>
        </div>
        <div id="rsi-params">
            <label>Periodo / Niveles</label>
            <div style="display:flex; gap:5px">
                <input type="number" id="rsi-p" value="14" title="Periodo">
                <input type="number" id="rsi-u" value="70" title="Sobrecompra">
                <input type="number" id="rsi-l" value="30" title="Sobreventa">
            </div>
        </div>
        <div id="stoc-params" style="display:none">
            <label>K / SC / SV</label>
            <div style="display:flex; gap:5px">
                <input type="number" id="stoc-k" value="14">
                <input type="number" id="stoc-u" value="80">
                <input type="number" id="stoc-l" value="20">
            </div>
        </div>
        <div class="group"><label>Expiración (Velas)</label><input type="number" id="exp" value="1"></div>
        <button onclick="intentarConexion()">Catalogar Ahora</button>
    </div>

    <div class="main">
        <div class="card">
            <h2 id="pairDisplay" style="margin:0; color:var(--accent)">LISTO</h2>
            <div class="efficiency-val" id="eff">0%</div>
            <div class="history-grid" id="grid"></div>
        </div>
        <div class="log-terminal" id="logger">> Iniciando sistema en GitHub Pages...</div>
    </div>

<script>
    const log = m => { document.getElementById('logger').innerHTML += `<br>> ${m}`; document.getElementById('logger').scrollTop = 9999; };
    
    function toggleInd() {
        const val = document.getElementById('indType').value;
        document.getElementById('rsi-params').style.display = val === 'RSI' ? 'block' : 'none';
        document.getElementById('stoc-params').style.display = val === 'STOC' ? 'block' : 'none';
    }

    // Estrategia de reintentos múltiples
    async function intentarConexion() {
        const pair = document.getElementById('pair').value;
        const tf = document.getElementById('tf').value;
        const targetUrl = `https://api.binance.com/api/v3/klines?symbol=${pair}&interval=${tf}&limit=500`;
        
        log(`📡 Intentando conectar con ${pair}...`);

        // Intento 1: Directo (algunos navegadores en GitHub lo permiten)
        try {
            const res = await fetch(targetUrl);
            if (res.ok) {
                const data = await res.json();
                return procesar(data);
            }
        } catch (e) { log("⚠️ Conexión directa bloqueada. Probando Túnel A..."); }

        // Intento 2: Proxy AllOrigins
        try {
            const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}&timestamp=${Date.now()}`);
            const json = await res.json();
            const data = JSON.parse(json.contents);
            if (data) return procesar(data);
        } catch (e) { log("⚠️ Túnel A fallido. Probando Túnel B..."); }

        // Intento 3: Proxy de Respaldo (Corsproxy.io)
        try {
            const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(targetUrl)}`);
            const data = await res.json();
            if (data) return procesar(data);
        } catch (e) { log("❌ Error crítico: Todos los túneles están bloqueados por tu red."); }
    }

    function procesar(data) {
        log("✅ Datos recibidos. Calculando...");
        const closes = data.map(d => parseFloat(d[4]));
        const highs = data.map(d => parseFloat(d[2]));
        const lows = data.map(d => parseFloat(d[3]));
        const type = document.getElementById('indType').value;
        const exp = parseInt(document.getElementById('exp').value);
        
        let indic, sc, sv;
        if(type === 'RSI') {
            indic = technicalindicators.RSI.calculate({values: closes, period: parseInt(document.getElementById('rsi-p').value)});
            sc = parseInt(document.getElementById('rsi-u').value);
            sv = parseInt(document.getElementById('rsi-l').value);
        } else {
            const s = technicalindicators.Stochastic.calculate({high: highs, low: lows, close: closes, period: parseInt(document.getElementById('stoc-k').value), signalPeriod: 3});
            indic = s.map(v => v.k);
            sc = parseInt(document.getElementById('stoc-u').value);
            sv = parseInt(document.getElementById('stoc-l').value);
        }

        let res = [];
        const offset = closes.length - indic.length;
        for (let i = closes.length - exp - 1; i >= offset; i--) {
            const val = indic[i - offset];
            if (val >= sc || val <= sv) {
                const win = val <= sv ? (closes[i+exp] > closes[i]) : (closes[i+exp] < closes[i]);
                res.push(win ? 'win' : 'loss');
                if (res.length >= 20) break;
            }
        }

        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        res.reverse().forEach(r => {
            const d = document.createElement('div'); d.className = `box ${r}`;
            grid.appendChild(d);
        });
        
        const wins = res.filter(r => r === 'win').length;
        document.getElementById('eff').innerText = (res.length > 0 ? Math.round((wins/res.length)*100) : 0) + "%";
        document.getElementById('pairDisplay').innerText = document.getElementById('pair').value;
        log(`🎯 Análisis exitoso. ${res.length} señales.`);
    }

    // Inicializar grid vacío
    for(let i=0; i<20; i++) document.getElementById('grid').innerHTML += '<div class="box"></div>';
</script>
</body>
</html>
