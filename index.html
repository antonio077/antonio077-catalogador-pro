<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catalogador Alpha | Medina Carrillo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0b1a; --card-bg: #12122b; --text-main: #ffffff;
            --text-dim: #8e8ea7; --green-win: #00c853; --red-loss: #ff3d00;
            --accent: #00ffcc; --border: #2d2d5a;
        }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Inter', sans-serif; display: flex; padding: 20px; margin: 0; min-height: 100vh; }
        .sidebar { width: 340px; background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border); height: fit-content; position: sticky; top: 20px; }
        h4 { margin: 0 0 15px 0; color: var(--accent); text-transform: uppercase; font-size: 14px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .group { margin-bottom: 12px; }
        label { font-size: 11px; color: var(--text-dim); display: block; margin-bottom: 5px; font-weight: 600; text-transform: uppercase; }
        select, input { background: #0b0b1a; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 6px; width: 100%; font-size: 13px; outline: none; box-sizing: border-box; }
        .main { flex: 1; margin-left: 30px; }
        .card { background-color: var(--card-bg); border-radius: 16px; padding: 25px; border: 1px solid var(--border); text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .efficiency-val { font-size: 65px; font-weight: 700; color: var(--accent); margin: 15px 0; text-shadow: 0 0 20px rgba(0,255,204,0.3); }
        .history-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-top: 20px; }
        .box { height: 45px; border-radius: 8px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); transition: 0.3s; }
        .win { background: var(--green-win) !important; border: none !important; box-shadow: 0 0 15px var(--green-win); }
        .loss { background: var(--red-loss) !important; border: none !important; box-shadow: 0 0 15px var(--red-loss); }
        .log-terminal { margin-top: 20px; background: #000; padding: 15px; border-radius: 8px; font-family: 'Courier New', monospace; font-size: 11px; color: #00ff00; height: 120px; overflow-y: auto; border: 1px solid var(--border); text-align: left; }
        button { width: 100%; padding: 14px; background: var(--accent); border: none; border-radius: 8px; cursor: pointer; font-weight: 800; color: #0b0b1a; margin-top: 10px; text-transform: uppercase; transition: 0.3s; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h4>Panel Medina Carrillo</h4>
        <div class="group"><label>Activo</label>
            <select id="pair">
                <option value="BTCUSDT">BTC / USDT</option>
                <option value="ETHUSDT">ETH / USDT</option>
                <option value="EURUSDT">EUR / USD</option>
            </select>
        </div>
        <div class="group"><label>Temporalidad</label>
            <select id="tf">
                <option value="1m">1m</option>
                <option value="5m" selected>5m</option>
                <option value="1h">1h</option>
            </select>
        </div>
        <div class="group"><label>RSI: Periodo / SC - SV</label>
            <div style="display:flex; gap:8px;">
                <input type="number" id="rsi-p" value="14">
                <input type="number" id="rsi-u" value="70">
                <input type="number" id="rsi-l" value="30">
            </div>
        </div>
        <div class="group"><label>Expiración (Velas)</label>
            <input type="number" id="exp" value="1">
        </div>
        <button onclick="ejecutarAnalisis()">Iniciar Catalogación</button>
    </div>

    <div class="main">
        <div class="card">
            <h2 id="pairDisplay" style="margin:0; color:var(--accent)">LISTO</h2>
            <div class="efficiency-val" id="eff">0%</div>
            <div class="history-grid" id="grid"></div>
        </div>
        <div class="log-terminal" id="logger">> Sistema autónomo cargado.</div>
    </div>

<script>
    const PROXY_URL = "https://script.google.com/macros/s/AKfycbxC4Goy3ID-pJ0svhmr7tIDzcmL8LE5SFaYvB2UQaVkumvppHaZ0cq86I8FsR2x3uTO7g/exec";

    function log(m) {
        const l = document.getElementById('logger');
        l.innerHTML += `<br>> ${m}`;
        l.scrollTop = l.scrollHeight;
    }

    // MOTOR NATIVO RSI (Sin librerías externas)
    function calcularRSI(data, period) {
        let results = [];
        let gains = [];
        let losses = [];

        for (let i = 1; i < data.length; i++) {
            let diff = data[i] - data[i - 1];
            gains.push(Math.max(0, diff));
            losses.push(Math.max(0, -diff));
        }

        let avgGain = gains.slice(0, period).reduce((a, b) => a + b) / period;
        let avgLoss = losses.slice(0, period).reduce((a, b) => a + b) / period;

        for (let i = period; i < data.length; i++) {
            let rs = avgGain / (avgLoss || 0.00001);
            results.push(100 - (100 / (1 + rs)));
            avgGain = (avgGain * (period - 1) + gains[i]) / period;
            avgLoss = (avgLoss * (period - 1) + losses[i]) / period;
        }
        return results;
    }

    async function ejecutarAnalisis() {
        const pair = document.getElementById('pair').value;
        const tf = document.getElementById('tf').value;
        log(`🚀 Conectando a Google Cloud para ${pair}...`);

        try {
            const response = await fetch(`${PROXY_URL}?pair=${pair}&tf=${tf}`);
            const data = await response.json();

            if (data && Array.isArray(data)) {
                log(`✅ Datos obtenidos. Analizando nativamente...`);
                procesar(data);
            }
        } catch (e) {
            log(`🛑 Error: Failed to fetch. Revisa tu Google Script.`);
        }
    }

    function procesar(data) {
        try {
            const closes = data.map(d => parseFloat(d[4])).filter(n => !isNaN(n));
            const pRSI = parseInt(document.getElementById('rsi-p').value);
            const exp = parseInt(document.getElementById('exp').value);
            const sc = parseInt(document.getElementById('rsi-u').value);
            const sv = parseInt(document.getElementById('rsi-l').value);

            const rsiValues = calcularRSI(closes, pRSI);
            let resultados = [];
            const offset = closes.length - rsiValues.length;

            for (let i = closes.length - exp - 1; i >= offset; i--) {
                const val = rsiValues[i - offset];
                if (val >= sc || val <= sv) {
                    const win = val <= sv ? (closes[i + exp] > closes[i]) : (closes[i + exp] < closes[i]);
                    resultados.push(win ? 'win' : 'loss');
                    if (resultados.length >= 20) break;
                }
            }

            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            resultados.reverse().forEach(r => {
                const d = document.createElement('div');
                d.className = `box ${r}`;
                grid.appendChild(d);
            });

            while(grid.children.length < 20) grid.innerHTML += '<div class="box"></div>';

            const wins = resultados.filter(r => r === 'win').length;
            const eff = resultados.length > 0 ? Math.round((wins / resultados.length) * 100) : 0;
            
            document.getElementById('eff').innerText = eff + "%";
            document.getElementById('pairDisplay').innerText = pair.value;
            log(`🎯 Análisis finalizado.`);
        } catch (err) {
            log(`❌ Error: ${err.message}`);
        }
    }

    // Rejilla inicial
    window.onload = () => {
        const grid = document.getElementById('grid');
        for(let i=0; i<20; i++) grid.innerHTML += '<div class="box"></div>';
    };
</script>
</body>
</html>
