<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catalogador Maestro | Medina Carrillo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0b1a; --card: #12122b; --accent: #00ffcc; --text: #fff; --green: #00c853; --red: #ff3d00; --border: #2d2d5a; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; padding: 20px; margin: 0; min-height: 100vh; }
        .sidebar { width: 340px; background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); height: fit-content; position: sticky; top: 20px; }
        .main { flex: 1; margin-left: 30px; }
        .card { background: var(--card); border-radius: 16px; padding: 25px; border: 1px solid var(--border); text-align: center; }
        .efficiency-val { font-size: 65px; font-weight: 700; color: var(--accent); margin: 15px 0; }
        .history-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 20px; }
        .box { height: 45px; border-radius: 8px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); }
        .win { background: var(--green) !important; box-shadow: 0 0 15px var(--green); border: none !important; }
        .loss { background: var(--red) !important; box-shadow: 0 0 15px var(--red); border: none !important; }
        .log-terminal { margin-top: 20px; background: #000; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 11px; color: #00ff00; height: 100px; overflow-y: auto; border: 1px solid var(--border); text-align: left; }
        select, input, textarea, button { width: 100%; padding: 12px; margin-top: 8px; border-radius: 8px; border: 1px solid var(--border); background: #0b0b1a; color: #fff; box-sizing: border-box; }
        textarea { height: 60px; font-size: 10px; border-color: var(--accent); resize: none; }
        button { background: var(--accent); color: #0b0b1a; font-weight: 800; cursor: pointer; border: none; text-transform: uppercase; margin-top: 15px; }
        label { font-size: 10px; color: #8e8ea7; font-weight: 600; display: block; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h4 style="color:var(--accent); margin-top:0">BYPASS MEDINA CARRILLO</h4>
        <label>Paso 1: Copia esta URL y ábrela en otra pestaña</label>
        <input type="text" id="urlHelp" readonly value="https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=5m&limit=500">
        
        <label>Paso 2: Pega aquí todo lo que aparezca</label>
        <textarea id="rawData" placeholder="Pega los datos aquí..."></textarea>
        
        <label>RSI: Periodo / SC - SV</label>
        <div style="display:flex; gap:5px">
            <input type="number" id="rsi-p" value="14">
            <input type="number" id="rsi-u" value="70">
            <input type="number" id="rsi-l" value="30">
        </div>
        
        <button onclick="procesarManual()">ANALIZAR DATOS</button>
    </div>

    <div class="main">
        <div class="card">
            <h2 style="margin:0; color:var(--accent)">ESTADO DE ESTRATEGIA</h2>
            <div class="efficiency-val" id="eff">0%</div>
            <div class="history-grid" id="grid"></div>
        </div>
        <div class="log-terminal" id="logger">> Esperando inyección manual de datos...</div>
    </div>

<script>
    function log(m) { document.getElementById('logger').innerHTML += `<br>> ${m}`; }

    function procesarManual() {
        const raw = document.getElementById('rawData').value;
        if(!raw) { log("❌ No has pegado datos."); return; }
        
        try {
            const data = JSON.parse(raw);
            log(`✅ ${data.length} velas cargadas. Calculando...`);
            
            const closes = data.map(d => parseFloat(d[4]));
            const pRSI = parseInt(document.getElementById('rsi-p').value);
            const sc = parseInt(document.getElementById('rsi-u').value);
            const sv = parseInt(document.getElementById('rsi-l').value);
            
            const rsi = calcularRSI(closes, pRSI);
            let res = [];
            const offset = closes.length - rsi.length;
            
            for (let i = closes.length - 2; i >= offset; i--) {
                const val = rsi[i - offset];
                if (val >= sc || val <= sv) {
                    const win = val <= sv ? (closes[i+1] > closes[i]) : (closes[i+1] < closes[i]);
                    res.push(win ? 'win' : 'loss');
                    if (res.length >= 20) break;
                }
            }
            
            dibujar(res);
        } catch(e) {
            log("❌ Error: Los datos pegados no son válidos.");
        }
    }

    function calcularRSI(data, p) {
        let results = [], gains = [], losses = [];
        for (let i = 1; i < data.length; i++) {
            let d = data[i] - data[i-1];
            gains.push(Math.max(0, d)); losses.push(Math.max(0, -d));
        }
        let avgG = gains.slice(0, p).reduce((a,b)=>a+b)/p, avgL = losses.slice(0, p).reduce((a,b)=>a+b)/p;
        for (let i = p; i < data.length; i++) {
            results.push(100 - (100 / (1 + (avgG/(avgL||0.0001)))));
            avgG = (avgG * (p-1) + gains[i]) / p; avgL = (avgL * (p-1) + losses[i]) / p;
        }
        return results;
    }

    function dibujar(res) {
        const g = document.getElementById('grid'); g.innerHTML = '';
        res.reverse().forEach(r => {
            const d = document.createElement('div'); d.className = `box ${r}`; g.appendChild(d);
        });
        while(g.children.length < 20) g.innerHTML += '<div class="box"></div>';
        const w = res.filter(r => r === 'win').length;
        document.getElementById('eff').innerText = (res.length ? Math.round((w/res.length)*100) : 0) + "%";
        log(`🎯 Catalogación terminada.`);
    }

    for(let i=0; i<20; i++) document.getElementById('grid').innerHTML += '<div class="box"></div>';
</script>
</body>
</html>
