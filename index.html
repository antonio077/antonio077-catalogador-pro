<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogador Medina Carrillo | Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/technicalindicators@3.1.0/dist/browser.js"></script>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --accent: #38bdf8;
            --green: #22c55e; --red: #ef4444; --text: #f8fafc;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { max-width: 900px; width: 100%; display: grid; grid-template-columns: 300px 1fr; gap: 20px; }
        .panel { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #334155; height: fit-content; }
        .main-view { background: var(--card); padding: 30px; border-radius: 12px; border: 1px solid #334155; text-align: center; }
        
        select, input { width: 100%; padding: 10px; margin: 8px 0 15px 0; border-radius: 6px; border: 1px solid #475569; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--accent); color: #0f172a; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }

        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 20px; }
        .box { height: 45px; border-radius: 6px; background: #334155; transition: 0.5s; }
        .win { background: var(--green); box-shadow: 0 0 15px var(--green); }
        .loss { background: var(--red); box-shadow: 0 0 15px var(--red); }
        
        .efficiency { font-size: 4rem; font-weight: 800; color: var(--accent); margin: 10px 0; }
        .log { margin-top: 20px; font-family: monospace; font-size: 11px; color: #94a3b8; text-align: left; max-height: 100px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <label>Activo</label>
        <select id="pair">
            <option value="BTCUSDT">BTC/USDT</option>
            <option value="ETHUSDT">ETH/USDT</option>
            <option value="EURUSDT">EUR/USD</option>
            <option value="GBPUSDT">GBP/USD</option>
        </select>

        <label>Temporalidad</label>
        <select id="tf">
            <option value="1m">1m</option><option value="5m" selected>5m</option>
            <option value="15m">15m</option><option value="1h">1h</option>
        </select>

        <label>Indicador</label>
        <select id="ind" onchange="document.getElementById('p-rsi').style.display = this.value=='RSI'?'block':'none'; document.getElementById('p-stoc').style.display = this.value=='STOC'?'block':'none';">
            <option value="RSI">RSI</option>
            <option value="STOC">Estocástico</option>
        </select>

        <div id="p-rsi">
            <label>Periodo / Niveles</label>
            <div style="display:flex; gap:5px">
                <input type="number" id="r-p" value="14">
                <input type="number" id="r-u" value="70">
                <input type="number" id="r-l" value="30">
            </div>
        </div>

        <div id="p-stoc" style="display:none">
            <label>K / SC / SV</label>
            <div style="display:flex; gap:5px">
                <input type="number" id="s-k" value="14">
                <input type="number" id="s-u" value="80">
                <input type="number" id="s-l" value="20">
            </div>
        </div>

        <label>Expira (Velas)</label>
        <input type="number" id="exp" value="1">
        
        <button onclick="run()">CATALOGAR</button>
    </div>

    <div class="main-view">
        <h2 id="displayPair">LISTO</h2>
        <div class="efficiency" id="eff">0%</div>
        <div class="grid" id="grid"></div>
        <div class="log" id="log">> Esperando ejecución...</div>
    </div>
</div>

<script>
    async function run() {
        const pair = document.getElementById('pair').value;
        const tf = document.getElementById('tf').value;
        const log = m => document.getElementById('log').innerText = "> " + m;
        
        log(`Conectando con Binance (${pair})...`);
        
        try {
            const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${pair}&interval=${tf}&limit=500`);
            const data = await res.json();
            
            const closes = data.map(d => parseFloat(d[4]));
            const highs = data.map(d => parseFloat(d[2]));
            const lows = data.map(d => parseFloat(d[3]));
            const type = document.getElementById('ind').value;
            const exp = parseInt(document.getElementById('exp').value);
            
            let indVal, up, lw;
            if(type === 'RSI') {
                indVal = technicalindicators.RSI.calculate({values: closes, period: parseInt(document.getElementById('r-p').value)});
                up = parseInt(document.getElementById('r-u').value); lw = parseInt(document.getElementById('r-l').value);
            } else {
                const s = technicalindicators.Stochastic.calculate({high: highs, low: lows, close: closes, period: parseInt(document.getElementById('s-k').value), signalPeriod: 3});
                indVal = s.map(v => v.k);
                up = parseInt(document.getElementById('s-u').value); lw = parseInt(document.getElementById('s-l').value);
            }

            let resList = [];
            const off = closes.length - indVal.length;
            for(let i = closes.length - exp - 1; i >= off; i--) {
                const v = indVal[i-off];
                if(v >= up || v <= lw) {
                    const win = v <= lw ? closes[i+exp] > closes[i] : closes[i+exp] < closes[i];
                    resList.push(win ? 'win' : 'loss');
                    if(resList.length >= 20) break;
                }
            }

            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            resList.reverse().forEach(r => {
                const d = document.createElement('div'); d.className = `box ${r}`;
                grid.appendChild(d);
            });

            const wins = resList.filter(r => r==='win').length;
            document.getElementById('eff').innerText = Math.round((wins/resList.length)*100) + "%";
            document.getElementById('displayPair').innerText = pair;
            log("Análisis exitoso.");
        } catch(e) {
            log("Error de conexión. Prueba subiendo el archivo a GitHub Pages.");
        }
    }

    // Grid inicial
    for(let i=0; i<20; i++) document.getElementById('grid').innerHTML += '<div class="box"></div>';
</script>
</body>
</html>
